<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Step 1: The Structure -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    
    <!-- Link to our future CSS file -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Importing 'Outfit', a modern Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <h1>Tic-Tac-Toe</h1>
        
        <!-- This will display "Your Turn" or "Game Over" -->
        <div class="status" id="statusText">Your Turn (X)</div>
        
        <!-- The 3x3 Game Board -->
        <div class="board" id="board">
            <!-- We use data-index to easily identify which cell was clicked in our JS -->
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        
        <button id="resetButton" class="reset-btn">Restart Game</button>
    </div>

    <!-- Link to our future JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
